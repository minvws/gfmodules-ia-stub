name: Package python virtual env

on:
  push:
    tags:
      - v*

jobs:
  build:
    strategy:
      matrix:
        python_version: ['3.11.2']
    runs-on: ubuntu-22.04

    steps:
      - name: Set env
        run: |
          echo "PIP_NO_BINARY=xmlsec,lxml" >> $GITHUB_ENV
          echo "RELEASE_VERSION=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV &&
          echo "PKG_NAME=`basename $GITHUB_REPOSITORY -private`" >> $GITHUB_ENV

      - name: Checkout
        uses: actions/checkout@v7

      - name: Prepare environment
        run: |
          sudo apt-get update
          sudo apt-get install libxmlsec1-dev pkg-config

      - name: Configure git to use GitHub token for private dependencies
        run: git config --global url.https://${{ secrets.REPO_READ_ONLY_TOKEN }}@github.com.insteadOf ssh://git@github.com

      - name: Build venv package
        uses: minvws/action-python-venv-package@v1
        with:
          python_version: ${{ matrix.python_version }}
          package_file_name: ${{ env.PKG_NAME }}
